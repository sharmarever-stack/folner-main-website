<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="format-detection" content="telephone=no">
<title>404 — Page Not Found | Folner</title>

<!-- SEO -->
<meta name="robots" content="noindex, nofollow">
<meta name="description" content="The page you're looking for doesn't exist. Return to Folner's homepage.">
<meta name="theme-color" content="#000000">

<!-- Favicon & Icons -->
<link rel="icon" type="image/png" href="assets/images/Folner_Icon_Light_Logo.png">
<link rel="apple-touch-icon" href="assets/images/Folner_Icon_Light_Logo.png">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --font: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: #000;
  color: #fff;
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
  text-align: center;
}
.error-code {
  font-size: clamp(4rem, 12vw, 8rem);
  font-weight: 700;
  letter-spacing: -0.03em;
  background: linear-gradient(90deg, #C679C4 0%, #56C2FF 50%, #59D499 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  margin-bottom: 1rem;
}
.error-title {
  font-size: clamp(1.25rem, 3vw, 1.75rem);
  font-weight: 500;
  color: #fff;
  margin-bottom: 0.75rem;
}
.error-desc {
  font-size: 1rem;
  color: rgba(255,255,255,0.55);
  max-width: 380px;
  line-height: 1.6;
  margin-bottom: 2.5rem;
}
.error-link {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 1.5rem;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  color: #fff;
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 500;
  transition: background 200ms ease, border-color 200ms ease;
}
.error-link:hover {
  background: rgba(255,255,255,0.05);
  border-color: rgba(255,255,255,0.25);
}
.error-link svg {
  width: 16px; height: 16px;
}
.footer-copy {
  position: absolute;
  bottom: 2rem;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.3);
}
</style>
</head>
<body>
  <div class="error-code">404</div>
  <h1 class="error-title">Page not found</h1>
  <p class="error-desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  <a href="/" class="error-link">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1L1 8l7 7"/><path d="M1 8h14"/></svg>
    Back to homepage
  </a>
  <p class="footer-copy">&copy; 2026 Folner, Inc.</p>
</body>
</html>
